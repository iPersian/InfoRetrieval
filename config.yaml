# Experiment Configuration for Information Retrieval Pipeline Study

# Dataset configuration
dataset:
  name: "antique"
  collection: "antique"  # PyTerrier collection name

# Retrieval parameters
retrieval:
  bm25:
    k1: 0.9
    b: 0.4
    fields: null  # Use default fields
  dense:
    model: "all-MiniLM-L6-v2"
    batch_size: 32
    device: "cpu"
    normalize_embeddings: true
  reranking:
    model: "cross-encoder/ms-marco-MiniLM-L6-v2"
    batch_size: 16
    device: "cpu"
    top_k: 1000  # Score all retrieved candidates

# Pipeline configuration
pipelines:
  - name: "bm25"
    stages: ["bm25"]
  - name: "dense"
    stages: ["dense"]
  - name: "bm25_reranker"
    stages: ["bm25", "reranker"]
  - name: "dense_reranker"
    stages: ["dense", "reranker"]

# Candidate depths to evaluate
candidate_depths: [20, 50, 100]

# Evaluation metrics
evaluation:
  metrics: ["recall", "ndcg", "mrr"]
  cutoffs: [10, 100]  # Compute @10 and @100

# Output configuration
output:
  results_dir: "results"
  metrics_format: ["csv", "json"]
  save_rankings: true
  timestamp_results: true  # Create timestamped subdirectories

# Logging configuration
logging:
  level: "INFO"
  log_file: "logs/ir_pipeline.log"
  console_output: true
  verbose: false  # Minimal console output per config specification
